name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.13
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser test engines
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run repository checks
        run: pnpm check

      - name: Retain synthetic browser-test evidence on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-evidence-${{ matrix.os }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
