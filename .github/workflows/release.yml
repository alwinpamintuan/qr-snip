name: Draft release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build draft release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tagged source
        run: pnpm check

      - name: Build browser archives
        run: |
          pnpm zip
          pnpm zip:firefox

      - name: Create checksums
        working-directory: .output
        run: sha256sum *.zip > SHA256SUMS.txt

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_flags=(--draft --generate-notes --verify-tag --title "QR Snip ${GITHUB_REF_NAME}")
          if [[ "${GITHUB_REF_NAME}" == v0.* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" .output/*.zip .output/SHA256SUMS.txt "${release_flags[@]}"
